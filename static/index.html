<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Ticket<span style="color:var(--primary)">AI</span></h1>
            <p class="subtitle">AI-Powered Ticket Management</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
            
            <p style="text-align:center; margin-top:15px; font-size:14px; color:var(--text-light)">
                Don't have an account? <a href="/static/register.html" style="color:var(--primary); text-decoration:none; font-weight:bold;">Register here</a>
            </p>

            <div id="authError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (getToken()) window.location.href = "/static/dashboard.html";

        function showErr(msg) {
            const el = document.getElementById("authError");
            el.textContent = msg;
            el.style.display = "block";
        }

        async function handleLogin(e) {
            e.preventDefault();
            try {
                const data = await api("/auth/login", {
                    method: "POST",
                    headers: {},
                    body: JSON.stringify({
                        username: document.getElementById("loginUser").value,
                        password: document.getElementById("loginPass").value,
                    }),
                });
                setAuth(data);
                const user = await api("/auth/me");
                localStorage.setItem("user", JSON.stringify(user));
                window.location.href = "/static/dashboard.html";
            } catch (err) {
                showErr(err.message);
            }
        }
    </script>
</body>
</html>
