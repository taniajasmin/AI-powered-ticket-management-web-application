<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Ticket<span style="color:var(--primary)">AI</span></h1>
            <p class="subtitle">AI-Powered Ticket Management</p>

            <div class="auth-tabs">
                <button class="active" onclick="showTab('login', this)">Login</button>
                <button onclick="showTab('register', this)">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUser" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" required minlength="6" placeholder="Min 6 characters">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div id="authError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (getToken()) window.location.href = "/static/dashboard.html";

        function showTab(tab, btn) {
            document.querySelectorAll(".auth-tabs button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
            document.getElementById("registerForm").classList.toggle("hidden", tab !== "register");
            document.getElementById("authError").style.display = "none";
        }

        function showErr(msg) {
            const el = document.getElementById("authError");
            el.textContent = msg;
            el.style.display = "block";
        }

        async function handleLogin(e) {
            e.preventDefault();
            try {
                const data = await api("/auth/login", {
                    method: "POST",
                    headers: {},
                    body: JSON.stringify({
                        username: document.getElementById("loginUser").value,
                        password: document.getElementById("loginPass").value,
                    }),
                });
                setAuth(data);
                const user = await api("/auth/me");
                localStorage.setItem("user", JSON.stringify(user));
                window.location.href = "/static/dashboard.html";
            } catch (err) {
                showErr(err.message);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            try {
                await api("/auth/register", {
                    method: "POST",
                    headers: {},
                    body: JSON.stringify({
                        full_name: document.getElementById("regName").value,
                        email: document.getElementById("regEmail").value,
                        username: document.getElementById("regUser").value,
                        password: document.getElementById("regPass").value,
                        role: "customer",
                    }),
                });
                showToast("Account created! Please login.");
                document.querySelector(".auth-tabs button").click();
            } catch (err) {
                showErr(err.message);
            }
        }
    </script>
</body>
</html>
