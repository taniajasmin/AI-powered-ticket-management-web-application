<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System - Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Ticket<span style="color:var(--primary)">AI</span></h1>
            <p class="subtitle">Create an Account</p>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUser" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" required minlength="6" placeholder="Min 6 characters">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            
            <p style="text-align:center; margin-top:15px; font-size:14px; color:var(--text-light)">
                Already have an account? <a href="/" style="color:var(--primary); text-decoration:none; font-weight:bold;">Login here</a>
            </p>

            <div id="authError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        if (getToken()) window.location.href = "/static/dashboard.html";

        function showErr(msg) {
            const el = document.getElementById("authError");
            el.textContent = msg;
            el.style.display = "block";
        }

        async function handleRegister(e) {
            e.preventDefault();
            try {
                await api("/auth/register", {
                    method: "POST",
                    headers: {},
                    body: JSON.stringify({
                        full_name: document.getElementById("regName").value,
                        email: document.getElementById("regEmail").value,
                        username: document.getElementById("regUser").value,
                        password: document.getElementById("regPass").value,
                        role: "customer",
                    }),
                });
                showToast("Account created! Redirecting to login...");
                setTimeout(() => {
                    window.location.href = "/";
                }, 1500);
            } catch (err) {
                showErr(err.message);
            }
        }
    </script>
</body>
</html>
