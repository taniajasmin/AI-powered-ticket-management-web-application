<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - TicketAI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand">Ticket<span>AI</span></div>
        <ul class="nav-links" id="navLinks"></ul>
        <div class="user-badge" id="userBadge"></div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Customers</h2>
            <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Customer</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Company</th><th>Phone</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="custTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Create Customer Modal -->
    <div class="modal-overlay hidden" id="createModal">
        <div class="modal">
            <h3>Add Customer</h3>
            <form onsubmit="createCustomer(event)">
                <div class="form-group"><label>Name</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="cEmail" required></div>
                <div class="form-group"><label>Company</label><input type="text" id="cCompany"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="cPhone"></div>
                <div style="display:flex;gap:10px;margin-top:16px">
                    <button type="submit" class="btn btn-primary">Create</button>
                    <button type="button" class="btn btn-ghost" onclick="document.getElementById('createModal').classList.add('hidden')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/nav.js"></script>
    <script>
        if (!getToken() || getUser().role !== "admin") window.location.href = "/";

        function openModal() { document.getElementById("createModal").classList.remove("hidden"); }

        async function loadCustomers() {
            const customers = await api("/admin/customers");
            if (!customers) return;

            document.getElementById("custTable").innerHTML = customers.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.company || "-"}</td>
                    <td>${c.phone || "-"}</td>
                    <td>${c.is_active
                        ? '<span style="color:var(--success)">Active</span>'
                        : '<span style="color:var(--danger)">Inactive</span>'}</td>
                    <td>
                        ${c.is_active
                            ? `<button class="btn btn-danger btn-sm" onclick="toggleActive(${c.id}, false)">Deactivate</button>`
                            : `<button class="btn btn-success btn-sm" onclick="toggleActive(${c.id}, true)">Activate</button>`}
                    </td>
                </tr>
            `).join("");
        }

        async function createCustomer(e) {
            e.preventDefault();
            try {
                await api("/admin/customers", {
                    method: "POST",
                    body: JSON.stringify({
                        name: document.getElementById("cName").value,
                        email: document.getElementById("cEmail").value,
                        company: document.getElementById("cCompany").value || null,
                        phone: document.getElementById("cPhone").value || null,
                    }),
                });
                document.getElementById("createModal").classList.add("hidden");
                showToast("Customer created");
                loadCustomers();
            } catch (err) { showToast(err.message, "error"); }
        }

        async function toggleActive(id, active) {
            try {
                await api(`/admin/customers/${id}`, {
                    method: "PATCH",
                    body: JSON.stringify({ is_active: active }),
                });
                showToast(active ? "Customer activated" : "Customer deactivated");
                loadCustomers();
            } catch (err) { showToast(err.message, "error"); }
        }

        loadCustomers();
    </script>
</body>
</html>
